<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MindMap — Brain AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #preview-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Landing screen */
    #landing {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    #landing h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    #landing h1 span { color: #00ffcc; }

    #landing p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
      max-width: 280px;
      line-height: 1.5;
    }

    .state-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .state-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    #start-btn {
      background: #00ffcc;
      color: #0a0a0f;
      border: none;
      padding: 0.9rem 2.5rem;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s;
    }

    #start-btn:hover { opacity: 0.85; }
    #start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #no-xr-msg {
      display: none;
      color: #ff6b6b;
      font-size: 0.85rem;
      max-width: 260px;
      text-align: center;
      line-height: 1.5;
    }

    /* AR UI overlay */
    #ar-ui {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
    }

    #ar-hint {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
      transition: opacity 0.4s;
    }

    #ar-state-badge {
      position: absolute;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
    }

    #exit-btn {
      pointer-events: all;
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 0.7rem 2rem;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <canvas id="preview-canvas"></canvas>

  <!-- Landing screen -->
  <div id="landing">
    <h1>Mind<span>Map</span></h1>
    <p>Point your camera at a flat surface to see the health of your brain.</p>
    <div id="state-badge-landing" class="state-badge"></div>
    <button id="start-btn">Start AR</button>
    <p id="no-xr-msg">
      WebXR AR is not supported on this device.<br/>
      Try opening this page in Chrome on Android.
    </p>
  </div>

  <!-- AR overlay UI -->
  <div id="ar-ui">
    <div id="ar-state-badge" class="state-badge"></div>
    <div id="ar-hint">Move camera to detect a surface</div>
    <button id="exit-btn">Exit AR</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ─── Supabase config ────────────────────────────────────────────────────────
    // Replace these with your actual keys once Person B shares them.
    const SUPABASE_URL = '';
    const SUPABASE_ANON_KEY = '';

    // ─── Brain state definitions ─────────────────────────────────────────────────
    const STATES = {
      thriving: {
        label: 'Thriving',
        color: 0x00ffcc,
        emissive: 0x00ffaa,
        emissiveBase: 0.8,
        pulseSpeed: 4.0,
        rotSpeed: 0.008,
        badgeBg: '#00ffcc22',
        badgeColor: '#00ffcc',
        dotColor: '#00ffcc',
      },
      healthy: {
        label: 'Healthy',
        color: 0x88aaff,
        emissive: 0x4466ff,
        emissiveBase: 0.3,
        pulseSpeed: 1.0,
        rotSpeed: 0.004,
        badgeBg: '#88aaff22',
        badgeColor: '#88aaff',
        dotColor: '#88aaff',
      },
      sluggish: {
        label: 'Sluggish',
        color: 0x887766,
        emissive: 0x332211,
        emissiveBase: 0.1,
        pulseSpeed: 0.4,
        rotSpeed: 0.002,
        badgeBg: '#88776622',
        badgeColor: '#aa9988',
        dotColor: '#aa9988',
      },
      rotting: {
        label: 'Rotting',
        color: 0x555555,
        emissive: 0x000000,
        emissiveBase: 0.0,
        pulseSpeed: 0.0,
        rotSpeed: 0.001,
        badgeBg: '#55555522',
        badgeColor: '#888888',
        dotColor: '#666666',
      },
    };

    // ─── Learning vs entertainment classifier ────────────────────────────────────
    const LEARNING_KEYWORDS = [
      'coding', 'tutorial', 'education', 'science', 'documentary',
      'language', 'math', 'programming', 'lecture', 'course', 'learn',
      'history', 'engineering', 'how to', 'explainer',
    ];

    function classifyCategory(category = '') {
      const lower = category.toLowerCase();
      return LEARNING_KEYWORDS.some(kw => lower.includes(kw))
        ? 'learning'
        : 'entertainment';
    }

    function calcBrainState(events) {
      if (!events || events.length === 0) return 'healthy';

      let learningMins = 0;
      let totalMins = 0;

      for (const ev of events) {
        const mins = ev.duration_mins || 0;
        totalMins += mins;
        if (classifyCategory(ev.category)) learningMins += mins; // wait - classifyCategory returns 'learning'|'entertainment'
      }

      // fix: check return value
      learningMins = 0;
      totalMins = 0;
      for (const ev of events) {
        const mins = ev.duration_mins || 0;
        totalMins += mins;
        if (classifyCategory(ev.category) === 'learning') learningMins += mins;
      }

      if (totalMins === 0) return 'healthy';
      const ratio = learningMins / totalMins;

      if (ratio >= 0.7) return 'thriving';
      if (ratio >= 0.5) return 'healthy';
      if (ratio >= 0.3) return 'sluggish';
      return 'rotting';
    }

    // ─── Fetch events from Supabase ──────────────────────────────────────────────
    async function fetchBrainState() {
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        // No keys yet — use demo state so visuals can be tested
        return 'thriving';
      }

      try {
        const sevenDaysAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
        const url = `${SUPABASE_URL}/rest/v1/events?select=category,duration_mins&recorded_at=gte.${sevenDaysAgo}`;
        const res = await fetch(url, {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          },
        });
        if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
        const events = await res.json();
        return calcBrainState(events);
      } catch (err) {
        console.warn('Supabase fetch failed, using fallback state:', err);
        return 'healthy';
      }
    }

    // ─── Three.js setup ──────────────────────────────────────────────────────────
    const canvas = document.getElementById('preview-canvas');
    const renderer = new THREE.WebGLRenderer({
      canvas,
      alpha: true,
      antialias: true,
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    // Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(1, 2, 1);
    scene.add(dirLight);
    const pointLight = new THREE.PointLight(0x00ffcc, 2, 3);
    pointLight.position.set(0, 0.5, 0);
    scene.add(pointLight);

    // Reticle (surface detection indicator)
    const reticleGeo = new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2);
    const reticleMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, side: THREE.DoubleSide });
    const reticle = new THREE.Mesh(reticleGeo, reticleMat);
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    // Brain model container
    const brainGroup = new THREE.Group();
    brainGroup.visible = false;
    scene.add(brainGroup);

    let brainMeshes = [];
    let brainMaterial = null;
    let currentState = 'healthy';
    let brainPlaced = false;

    const clock = new THREE.Clock();

    // Load GLTF brain model
    const loader = new GLTFLoader();
    loader.load(
      'assets/brain.glb',
      (gltf) => {
        const model = gltf.scene;

        // Normalise scale — fit within ~0.3m for AR
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        model.scale.setScalar(0.3 / maxDim);

        // Centre the model
        const centre = box.getCenter(new THREE.Vector3());
        model.position.sub(centre.multiplyScalar(0.3 / maxDim));

        // Collect all meshes and apply shared material
        brainMaterial = new THREE.MeshStandardMaterial({
          color: new THREE.Color(STATES[currentState].color),
          emissive: new THREE.Color(STATES[currentState].emissive),
          emissiveIntensity: STATES[currentState].emissiveBase,
          roughness: 0.4,
          metalness: 0.2,
        });

        model.traverse((child) => {
          if (child.isMesh) {
            child.material = brainMaterial;
            brainMeshes.push(child);
          }
        });

        brainGroup.add(model);
      },
      undefined,
      (err) => {
        console.error('Failed to load brain.glb:', err);
        // Fallback: simple sphere so the AR demo still works without the model
        brainMaterial = new THREE.MeshStandardMaterial({
          color: new THREE.Color(STATES[currentState].color),
          emissive: new THREE.Color(STATES[currentState].emissive),
          emissiveIntensity: STATES[currentState].emissiveBase,
          roughness: 0.4,
          metalness: 0.2,
        });
        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(0.12, 32, 32),
          brainMaterial
        );
        brainMeshes.push(sphere);
        brainGroup.add(sphere);
      }
    );

    // ─── Brain state application ─────────────────────────────────────────────────
    function applyBrainState(stateName) {
      currentState = stateName;
      const s = STATES[stateName];
      if (brainMaterial) {
        brainMaterial.color.setHex(s.color);
        brainMaterial.emissive.setHex(s.emissive);
      }
      pointLight.color.setHex(s.color);
      renderStateBadge(stateName);
    }

    function renderStateBadge(stateName) {
      const s = STATES[stateName];
      const html = `
        <span class="state-dot" style="background:${s.dotColor}"></span>
        ${s.label}
      `;
      const style = `background:${s.badgeBg}; color:${s.badgeColor}; border:1px solid ${s.badgeColor}44;`;

      document.getElementById('state-badge-landing').innerHTML = html;
      document.getElementById('state-badge-landing').setAttribute('style', style);
      document.getElementById('ar-state-badge').innerHTML = html;
      document.getElementById('ar-state-badge').setAttribute('style', style);
    }

    // ─── Animation loop (non-XR — desktop preview) ───────────────────────────────
    function animateBrain(elapsed) {
      if (!brainMaterial) return;
      const s = STATES[currentState];

      const pulse = s.pulseSpeed > 0
        ? Math.sin(elapsed * s.pulseSpeed) * 0.15
        : 0;
      brainMaterial.emissiveIntensity = s.emissiveBase + pulse;
      pointLight.intensity = 1.5 + pulse * 2;

      brainGroup.rotation.y += s.rotSpeed;
    }

    // Desktop preview loop (before AR starts)
    function previewLoop() {
      const elapsed = clock.getElapsedTime();
      animateBrain(elapsed);
      renderer.render(scene, camera);
    }
    renderer.setAnimationLoop(previewLoop);

    // Position brain for desktop preview
    camera.position.set(0, 0, 1);
    brainGroup.visible = true;

    // ─── WebXR AR ────────────────────────────────────────────────────────────────
    let xrSession = null;
    let hitTestSource = null;
    let hitTestSourceRequested = false;

    const startBtn = document.getElementById('start-btn');
    const landing = document.getElementById('landing');
    const arUI = document.getElementById('ar-ui');
    const arHint = document.getElementById('ar-hint');

    async function startAR() {
      if (!navigator.xr) {
        document.getElementById('no-xr-msg').style.display = 'block';
        return;
      }

      const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
      if (!supported) {
        document.getElementById('no-xr-msg').style.display = 'block';
        return;
      }

      xrSession = await navigator.xr.requestSession('immersive-ar', {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: arUI },
      });

      renderer.xr.setReferenceSpaceType('local');
      await renderer.xr.setSession(xrSession);

      // Reset state for AR
      brainPlaced = false;
      reticle.visible = false;
      brainGroup.visible = false;
      hitTestSourceRequested = false;
      hitTestSource = null;

      landing.style.display = 'none';
      arUI.style.display = 'block';

      // Place brain on tap
      xrSession.addEventListener('select', onSelect);

      xrSession.addEventListener('end', () => {
        hitTestSource = null;
        hitTestSourceRequested = false;
        landing.style.display = 'flex';
        arUI.style.display = 'none';
        brainGroup.visible = true;
        reticle.visible = false;
        renderer.setAnimationLoop(previewLoop);
        xrSession = null;
      });

      renderer.setAnimationLoop(xrLoop);
    }

    function onSelect() {
      if (reticle.visible && !brainPlaced) {
        brainGroup.position.setFromMatrixPosition(reticle.matrix);
        brainGroup.position.y += 0.05; // lift slightly above surface
        brainGroup.visible = true;
        brainPlaced = true;
        arHint.style.opacity = '0';
      }
    }

    function xrLoop(timestamp, frame) {
      if (!frame) return;

      const elapsed = clock.getElapsedTime();
      animateBrain(elapsed);

      const referenceSpace = renderer.xr.getReferenceSpace();
      const session = renderer.xr.getSession();

      // Request hit test source once
      if (!hitTestSourceRequested) {
        session.requestReferenceSpace('viewer').then((viewerSpace) => {
          session.requestHitTestSource({ space: viewerSpace }).then((src) => {
            hitTestSource = src;
          });
        });
        hitTestSourceRequested = true;
      }

      // Update reticle from hit test results
      if (hitTestSource) {
        const results = frame.getHitTestResults(hitTestSource);
        if (results.length > 0) {
          const pose = results[0].getPose(referenceSpace);
          reticle.visible = !brainPlaced;
          reticle.matrix.fromArray(pose.transform.matrix);
        } else {
          reticle.visible = false;
        }
      }

      renderer.render(scene, camera);
    }

    // ─── Exit AR ─────────────────────────────────────────────────────────────────
    document.getElementById('exit-btn').addEventListener('click', () => {
      if (xrSession) xrSession.end();
    });

    // ─── Start button ─────────────────────────────────────────────────────────────
    startBtn.addEventListener('click', startAR);

    // ─── Check WebXR support on load ─────────────────────────────────────────────
    if (!navigator.xr) {
      startBtn.textContent = 'AR Not Supported';
      startBtn.disabled = true;
      document.getElementById('no-xr-msg').style.display = 'block';
    } else {
      navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
        if (!supported) {
          startBtn.textContent = 'AR Not Supported';
          startBtn.disabled = true;
          document.getElementById('no-xr-msg').style.display = 'block';
        }
      });
    }

    // ─── Handle resize ────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Init: fetch brain state ──────────────────────────────────────────────────
    fetchBrainState().then((state) => {
      applyBrainState(state);
    });
  </script>
</body>
</html>
