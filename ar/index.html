<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MindMap — Brain AR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Landing screen -->
  <div id="landing">
    <h1>Mind<span>Map</span></h1>
    <p>Point the camera at your face to see the health of your brain.</p>
    <div id="state-badge-landing" class="state-badge"></div>
    <button id="start-btn">Start AR</button>
    <p id="error-msg"></p>
    <p id="debug-msg" style="font-size:0.75rem;color:rgba(255,255,255,0.35);margin-top:-0.5rem;"></p>
  </div>

  <!-- AR camera + Three.js layer -->
  <div id="ar-view">
    <video id="camera-video" autoplay playsinline muted></video>
    <canvas id="three-canvas"></canvas>
  </div>

  <!-- AR overlay UI -->
  <div id="ar-ui">
    <div id="ar-state-badge" class="state-badge"></div>
    <div id="ar-hint">Hold up — brain loading…</div>
    <button id="exit-btn">Exit AR</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.150.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="app.js"></script>

</body>
</html>
