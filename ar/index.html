<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MindMap — Brain AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Landing screen */
    #landing {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    #landing h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    #landing h1 span { color: #00ffcc; }

    #landing p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
      max-width: 280px;
      line-height: 1.5;
    }

    .state-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .state-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    #start-btn {
      background: #00ffcc;
      color: #0a0a0f;
      border: none;
      padding: 0.9rem 2.5rem;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s;
    }

    #start-btn:hover { opacity: 0.85; }
    #start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #no-xr-msg {
      display: none;
      color: #ff6b6b;
      font-size: 0.85rem;
      max-width: 260px;
      text-align: center;
      line-height: 1.5;
    }

    /* AR UI overlay */
    #ar-ui {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
    }

    #ar-hint {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
      transition: opacity 0.4s;
    }

    #ar-state-badge {
      position: absolute;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
    }

    #exit-btn {
      pointer-events: all;
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 0.7rem 2rem;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Landing screen -->
  <div id="landing">
    <h1>Mind<span>Map</span></h1>
    <p>Point the camera at your face to see the health of your brain.</p>
    <div id="state-badge-landing" class="state-badge"></div>
    <button id="start-btn">Start AR</button>
    <p id="no-xr-msg">Camera access is required. Please allow camera permissions and try again.</p>
  </div>

  <!-- AR overlay UI -->
  <div id="ar-ui">
    <div id="ar-state-badge" class="state-badge"></div>
    <div id="ar-hint">Point camera at your face</div>
    <button id="exit-btn">Exit AR</button>
  </div>

  <!-- MindAR: face-tracking AR, exposes window.THREE + window.MINDAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-three.prod.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ─── Supabase config ────────────────────────────────────────────────────────
    // Replace these with your actual keys once Person B shares them.
    const SUPABASE_URL = '';
    const SUPABASE_ANON_KEY = '';

    // ─── Brain state definitions ─────────────────────────────────────────────────
    const STATES = {
      thriving: {
        label: 'Thriving',
        color: 0x00ffcc,
        emissive: 0x00ffaa,
        emissiveBase: 0.8,
        pulseSpeed: 4.0,
        rotSpeed: 0.008,
        badgeBg: '#00ffcc22',
        badgeColor: '#00ffcc',
        dotColor: '#00ffcc',
      },
      healthy: {
        label: 'Healthy',
        color: 0x88aaff,
        emissive: 0x4466ff,
        emissiveBase: 0.3,
        pulseSpeed: 1.0,
        rotSpeed: 0.004,
        badgeBg: '#88aaff22',
        badgeColor: '#88aaff',
        dotColor: '#88aaff',
      },
      sluggish: {
        label: 'Sluggish',
        color: 0x887766,
        emissive: 0x332211,
        emissiveBase: 0.1,
        pulseSpeed: 0.4,
        rotSpeed: 0.002,
        badgeBg: '#88776622',
        badgeColor: '#aa9988',
        dotColor: '#aa9988',
      },
      rotting: {
        label: 'Rotting',
        color: 0x555555,
        emissive: 0x000000,
        emissiveBase: 0.0,
        pulseSpeed: 0.0,
        rotSpeed: 0.001,
        badgeBg: '#55555522',
        badgeColor: '#888888',
        dotColor: '#666666',
      },
    };

    // ─── Learning vs entertainment classifier ────────────────────────────────────
    const LEARNING_KEYWORDS = [
      'coding', 'tutorial', 'education', 'science', 'documentary',
      'language', 'math', 'programming', 'lecture', 'course', 'learn',
      'history', 'engineering', 'how to', 'explainer',
    ];

    function classifyCategory(category = '') {
      const lower = category.toLowerCase();
      return LEARNING_KEYWORDS.some(kw => lower.includes(kw))
        ? 'learning'
        : 'entertainment';
    }

    function calcBrainState(events) {
      if (!events || events.length === 0) return 'healthy';

      let learningMins = 0;
      let totalMins = 0;

      for (const ev of events) {
        const mins = ev.duration_mins || 0;
        totalMins += mins;
        if (classifyCategory(ev.category)) learningMins += mins; // wait - classifyCategory returns 'learning'|'entertainment'
      }

      // fix: check return value
      learningMins = 0;
      totalMins = 0;
      for (const ev of events) {
        const mins = ev.duration_mins || 0;
        totalMins += mins;
        if (classifyCategory(ev.category) === 'learning') learningMins += mins;
      }

      if (totalMins === 0) return 'healthy';
      const ratio = learningMins / totalMins;

      if (ratio >= 0.7) return 'thriving';
      if (ratio >= 0.5) return 'healthy';
      if (ratio >= 0.3) return 'sluggish';
      return 'rotting';
    }

    // ─── Fetch events from Supabase ──────────────────────────────────────────────
    async function fetchBrainState() {
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        // No keys yet — use demo state so visuals can be tested
        return 'thriving';
      }

      try {
        const sevenDaysAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
        const url = `${SUPABASE_URL}/rest/v1/events?select=category,duration_mins&recorded_at=gte.${sevenDaysAgo}`;
        const res = await fetch(url, {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          },
        });
        if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
        const events = await res.json();
        return calcBrainState(events);
      } catch (err) {
        console.warn('Supabase fetch failed, using fallback state:', err);
        return 'healthy';
      }
    }

    // ─── Three.js + MindAR setup ─────────────────────────────────────────────────
    const mindarThree = new window.MINDAR.FACE.MindARThree({
      container: document.body,
    });
    const { renderer, scene, camera } = mindarThree;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    // Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(1, 2, 1);
    scene.add(dirLight);
    const pointLight = new THREE.PointLight(0x00ffcc, 2, 3);
    pointLight.position.set(0, 0.5, 0);
    scene.add(pointLight);

    // Brain model container — anchored to forehead landmark, floats above head
    const brainGroup = new THREE.Group();
    brainGroup.position.set(0, 0.5, 0); // lift above the forehead anchor point
    const anchor = mindarThree.addAnchor(10); // landmark 10 = top of forehead
    brainGroup.visible = true;
    anchor.group.add(brainGroup);

    let brainMeshes = [];
    let brainMaterial = null;
    let currentState = 'healthy';

    const clock = new THREE.Clock();

    // Load GLTF brain model
    const loader = new GLTFLoader();
    loader.load(
      'assets/brain.glb',
      (gltf) => {
        const model = gltf.scene;

        // Normalise scale — fit within ~0.3m for AR
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        model.scale.setScalar(0.3 / maxDim);

        // Centre the model
        const centre = box.getCenter(new THREE.Vector3());
        model.position.sub(centre.multiplyScalar(0.3 / maxDim));

        // Collect all meshes and apply shared material
        brainMaterial = new THREE.MeshStandardMaterial({
          color: new THREE.Color(STATES[currentState].color),
          emissive: new THREE.Color(STATES[currentState].emissive),
          emissiveIntensity: STATES[currentState].emissiveBase,
          roughness: 0.4,
          metalness: 0.2,
        });

        model.traverse((child) => {
          if (child.isMesh) {
            child.material = brainMaterial;
            brainMeshes.push(child);
          }
        });

        brainGroup.add(model);
      },
      undefined,
      (err) => {
        console.error('Failed to load brain.glb:', err);
        // Fallback: simple sphere so the AR demo still works without the model
        brainMaterial = new THREE.MeshStandardMaterial({
          color: new THREE.Color(STATES[currentState].color),
          emissive: new THREE.Color(STATES[currentState].emissive),
          emissiveIntensity: STATES[currentState].emissiveBase,
          roughness: 0.4,
          metalness: 0.2,
        });
        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(0.12, 32, 32),
          brainMaterial
        );
        brainMeshes.push(sphere);
        brainGroup.add(sphere);
      }
    );

    // ─── Brain state application ─────────────────────────────────────────────────
    function applyBrainState(stateName) {
      currentState = stateName;
      const s = STATES[stateName];
      if (brainMaterial) {
        brainMaterial.color.setHex(s.color);
        brainMaterial.emissive.setHex(s.emissive);
      }
      pointLight.color.setHex(s.color);
      renderStateBadge(stateName);
    }

    function renderStateBadge(stateName) {
      const s = STATES[stateName];
      const html = `
        <span class="state-dot" style="background:${s.dotColor}"></span>
        ${s.label}
      `;
      const style = `background:${s.badgeBg}; color:${s.badgeColor}; border:1px solid ${s.badgeColor}44;`;

      document.getElementById('state-badge-landing').innerHTML = html;
      document.getElementById('state-badge-landing').setAttribute('style', style);
      document.getElementById('ar-state-badge').innerHTML = html;
      document.getElementById('ar-state-badge').setAttribute('style', style);
    }

    // ─── Animation loop (non-XR — desktop preview) ───────────────────────────────
    function animateBrain(elapsed) {
      if (!brainMaterial) return;
      const s = STATES[currentState];

      const pulse = s.pulseSpeed > 0
        ? Math.sin(elapsed * s.pulseSpeed) * 0.15
        : 0;
      brainMaterial.emissiveIntensity = s.emissiveBase + pulse;
      pointLight.intensity = 1.5 + pulse * 2;

      brainGroup.rotation.y += s.rotSpeed;
    }

    // Shared animation loop — runs continuously; MindAR controls camera during AR
    renderer.setAnimationLoop(() => {
      const elapsed = clock.getElapsedTime();
      animateBrain(elapsed);
      renderer.render(scene, camera);
    });

    // ─── MindAR AR controls ───────────────────────────────────────────────────────
    const startBtn = document.getElementById('start-btn');
    const landing = document.getElementById('landing');
    const arUI = document.getElementById('ar-ui');

    // ─── Start button ─────────────────────────────────────────────────────────────
    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      startBtn.textContent = 'Requesting camera…';

      // Explicitly request front camera permission first so the browser shows the prompt
      try {
        await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      } catch (err) {
        startBtn.textContent = 'Start AR';
        startBtn.disabled = false;
        document.getElementById('no-xr-msg').textContent =
          err.name === 'NotAllowedError'
            ? 'Camera permission denied. Please allow camera access in your browser settings and try again.'
            : 'Could not access camera: ' + err.message;
        document.getElementById('no-xr-msg').style.display = 'block';
        return;
      }

      startBtn.textContent = 'Loading…';
      landing.style.display = 'none';
      arUI.style.display = 'block';

      try {
        await mindarThree.start();
      } catch (err) {
        console.error('MindAR failed to start:', err);
        landing.style.display = 'flex';
        arUI.style.display = 'none';
        startBtn.textContent = 'Start AR';
        startBtn.disabled = false;
        document.getElementById('no-xr-msg').textContent = 'AR failed to start. Try refreshing the page.';
        document.getElementById('no-xr-msg').style.display = 'block';
      }
    });

    // ─── Exit AR ─────────────────────────────────────────────────────────────────
    document.getElementById('exit-btn').addEventListener('click', async () => {
      await mindarThree.stop();
      landing.style.display = 'flex';
      arUI.style.display = 'none';
      startBtn.disabled = false;
    });

    // ─── Check camera support on load ────────────────────────────────────────────
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      startBtn.textContent = 'Camera Not Supported';
      startBtn.disabled = true;
      document.getElementById('no-xr-msg').style.display = 'block';
    }

    // ─── Init: fetch brain state ──────────────────────────────────────────────────
    fetchBrainState().then((state) => {
      applyBrainState(state);
    });
  </script>
</body>
</html>
