<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gemini API Key Tester</title>
  <style>
    body { background: #08080f; color: #e6e6f0; font-family: system-ui, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    h2 { font-size: 18px; margin-bottom: 4px; }
    p  { color: #5a5a78; font-size: 13px; margin-bottom: 24px; }
    label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #5a5a78; }
    input, select {
      display: block; width: 100%; margin: 6px 0 16px;
      background: #0e0e1a; border: 1px solid #1a1a2c; border-radius: 8px;
      color: #e6e6f0; padding: 10px 12px; font-size: 14px; outline: none;
    }
    input:focus, select:focus { border-color: #1D9E75; }
    button {
      background: #1D9E75; color: #fff; border: none; border-radius: 8px;
      padding: 11px 22px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #17876a; }
    button:disabled { background: #1a2e28; color: #5a5a78; cursor: not-allowed; }
    #result {
      margin-top: 24px; background: #0e0e1a; border: 1px solid #1a1a2c;
      border-radius: 8px; padding: 16px; font-size: 13px; display: none;
    }
    .label-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .cat-badge {
      padding: 3px 10px; border-radius: 99px; font-weight: 700;
      font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
    }
    .ok   { color: #1D9E75; }
    .fail { color: #D85A30; }
    pre { background: #12121e; border-radius: 6px; padding: 10px; font-size: 11px; overflow-x: auto; white-space: pre-wrap; color: #9090b0; margin: 0; }
  </style>
</head>
<body>
  <h2>🔑 Gemini API Key Tester</h2>
  <p>Tests your key using the exact same prompt the extension sends.</p>

  <label>API Key</label>
  <input id="key" type="password" placeholder="Paste your Gemini API key here" />

  <label>Test URL</label>
  <input id="url" value="https://www.youtube.com/watch?v=dQw4w9WgXcQ" />

  <label>Test Page Title</label>
  <input id="title" value="Rick Astley - Never Gonna Give You Up (Official Video)" />

  <button id="btn" onclick="runTest()">Run Test</button>

  <div id="result"></div>

  <script>
    const VALID_CATEGORIES = ['learning','entertainment','social media','productivity','news','other'];
    const CAT_COLOR = {
      learning: '#1D9E75', entertainment: '#D85A30', 'social media': '#C44BE0',
      productivity: '#378ADD', news: '#EF9F27', other: '#7a7a8a',
    };

    async function runTest() {
      const key   = document.getElementById('key').value.trim();
      const url   = document.getElementById('url').value.trim();
      const title = document.getElementById('title').value.trim();
      const btn   = document.getElementById('btn');
      const result = document.getElementById('result');

      if (!key) { alert('Paste your API key first.'); return; }

      btn.disabled = true;
      btn.textContent = 'Testing…';
      result.style.display = 'none';

      const prompt = `Classify this website into exactly one category.
URL: ${url}
Title: ${title}

Categories: learning, entertainment, social media, productivity, news, other

Rules:
- "learning" = tutorials, courses, documentation, educational videos, Wikipedia
- "entertainment" = YouTube (non-educational), Netflix, gaming, memes
- "social media" = Twitter/X, Instagram, Reddit, Facebook, TikTok, LinkedIn
- "productivity" = email, coding, Google Docs, project management tools
- "news" = news articles, journalism, blogs about current events
- "other" = anything that doesn't fit above

Reply with only the category word, nothing else.`;

      try {
        const t0  = Date.now();
        const res = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { temperature: 0, maxOutputTokens: 1024 },
            }),
          }
        );
        const ms   = Date.now() - t0;
        const data = await res.json();

        if (!res.ok) {
          result.innerHTML = `<div class="fail">✗ API error ${res.status}</div><pre>${JSON.stringify(data, null, 2)}</pre>`;
          result.style.display = 'block';
          return;
        }

        // gemini-2.5-flash is a thinking model — skip thought parts, use the answer part
        const parts      = data?.candidates?.[0]?.content?.parts ?? [];
        const answerPart = parts.find(p => !p.thought) ?? parts[parts.length - 1];
        const raw        = (answerPart?.text ?? '').trim().toLowerCase();
        const match      = VALID_CATEGORIES.find(c => raw.includes(c)) ?? 'other';
        const color      = CAT_COLOR[match];

        const allParts = parts.map((p, i) => ({
          index:   i,
          thought: p.thought ?? false,
          text:    (p.text ?? '').substring(0, 300) + (p.text?.length > 300 ? '…' : ''),
        }));

        result.innerHTML = `
          <div class="label-row">
            <span class="ok">✓ Key works</span>
            <span style="color:#5a5a78;font-size:12px">${ms}ms · ${parts.length} part(s) in response</span>
          </div>
          <div class="label-row">
            <span style="color:#5a5a78;font-size:13px">Result:</span>
            <span class="cat-badge" style="background:${color}22;color:${color}">${match}</span>
          </div>
          <div style="color:#5a5a78;font-size:12px;margin:8px 0 4px">Answer part text: <em style="color:#9090b0">"${raw}"</em></div>
          <div style="color:#5a5a78;font-size:11px;margin-bottom:6px">All parts:</div>
          <pre>${JSON.stringify(allParts, null, 2)}</pre>
          <div style="color:#5a5a78;font-size:11px;margin:8px 0 4px">Token usage:</div>
          <pre>${JSON.stringify(data?.usageMetadata ?? {}, null, 2)}</pre>`;
        result.style.display = 'block';

      } catch (err) {
        result.innerHTML = `<div class="fail">✗ Network error</div><pre>${err.message}</pre>`;
        result.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run Test';
      }
    }
  </script>
</body>
</html>
